# P0-10: quality gates en cada PR — lint, test, build
# Configura en GitHub: Settings → Branches → regla de protección en main
# requiriendo que este workflow pase antes de mergear.

name: CI

on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Valores de build: no conectan a servicios reales; Prisma generate no abre socket.
# Ajusta con GitHub Environments/Secrets en el repo si el build exige más claves.
env:
  CI: true
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
  DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_00000000000000000000000000000000
  CLERK_SECRET_KEY: sk_test_00000000000000000000000000000000
  CLERK_WEBHOOK_SECRET: whsec_ci_placeholder
  GEMINI_API_KEY: ci_gemnini_placeholder
  RESEND_API_KEY: re_ci_placeholder

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: ESLint
        run: npm run lint

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Vitest
        run: npm test

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Next.js production build
        run: npm run build

  e2e:
    name: e2e-api-web-cli
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Prepare database schema
        run: npx prisma db push --skip-generate
      - name: Seed QA dataset
        run: npm run prisma:seed
      - name: Generate E2E CI env
        run: npm run e2e:prepare-ci
      - name: Run Playwright E2E (API + web public + CLI)
        id: run-e2e
        run: npm run test:e2e:ci 2>&1 | tee e2e-output.log
      - name: Triage E2E log
        if: failure()
        run: npm run e2e:triage-log
      - name: Upload E2E triage
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-triage
          path: e2e-triage.md
          if-no-files-found: ignore
      - name: Comment triage on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'e2e-triage.md';
            if (!context.issue.number || !fs.existsSync(path)) {
              core.info('No PR context or no triage file.');
              return;
            }
            const body = fs.readFileSync(path, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
          if-no-files-found: ignore
